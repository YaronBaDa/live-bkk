<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live / BKK — Bangkok Live Music</title>
<meta name="description" content="A directory of live music in Bangkok. Concerts, venues, artists. Real shows, verified sources. Updated weekly.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Inter+Tight:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0A0A;
    --paper:#FFFFFF;
    --hair:#0A0A0A;
    --red:#E1261C;
    --mute:rgba(10,10,10,.55);
    --edge:32px;
    --gap:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink)}
  body{
    font-family:'Inter',Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5;
    -webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;
  }
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  button,input{font:inherit;color:inherit}
  .cap{font-family:'Inter',sans-serif;font-weight:500;font-size:11px;letter-spacing:.08em;text-transform:uppercase;line-height:1.3}
  .tight{font-family:'Inter Tight',sans-serif;font-weight:900;letter-spacing:-0.035em;text-transform:uppercase;line-height:.95}
  .red{color:var(--red)}

  /* ========== A11Y UTILITIES ========== */
  .skip-link{
    position:absolute;left:-9999px;top:0;z-index:1000;
    padding:10px 16px;background:var(--ink);color:var(--paper);
    font-family:'Inter',sans-serif;font-weight:600;font-size:12px;
    letter-spacing:.08em;text-transform:uppercase;
  }
  .skip-link:focus{left:8px;top:8px;outline:3px solid var(--red);outline-offset:2px}
  .sr-only{
    position:absolute;width:1px;height:1px;padding:0;margin:-1px;
    overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
  }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{
      animation-duration:0.01ms!important;animation-iteration-count:1!important;
      transition-duration:0.01ms!important;scroll-behavior:auto!important;
    }
  }

  /* ========== TOPBAR ========== */
  header.bar{
    position:sticky;top:0;z-index:20;background:var(--paper);
    display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:24px;
    padding:16px var(--edge);border-bottom:1px solid var(--hair);
  }
  .logo{
    font-family:'Inter Tight',sans-serif;font-weight:900;font-size:18px;
    letter-spacing:-0.04em;line-height:1;text-transform:uppercase;
  }
  nav.menu{display:flex;gap:28px;justify-content:center}
  nav.menu a{
    font-family:'Inter',sans-serif;font-weight:500;font-size:11px;
    letter-spacing:.1em;text-transform:uppercase;padding:4px 0;
    border-bottom:1px solid transparent;
  }
  nav.menu a:hover{color:var(--red)}
  nav.menu a.active{border-bottom-color:var(--ink)}
  nav.menu a.active:hover{border-bottom-color:var(--red)}
  .bar-right{
    font-family:'Inter',sans-serif;font-weight:500;font-size:11px;
    letter-spacing:.08em;text-transform:uppercase;opacity:.55;
  }

  /* ========== PAGE HEADER ========== */
  .page-head{
    padding:48px var(--edge) 32px;border-bottom:1px solid var(--hair);
    display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end;
  }
  .page-head h1{
    font-family:'Inter Tight',sans-serif;font-weight:900;
    letter-spacing:-0.05em;line-height:.88;text-transform:uppercase;
    font-size:clamp(48px,9vw,128px);
  }
  .page-head h1 .red{color:var(--red)}
  .page-head .meta{font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.55;text-align:right}
  .page-head .meta b{display:block;color:var(--ink);opacity:.65;font-weight:500;margin-bottom:4px}

  /* ========== FILTER BAR ========== */
  .filters{padding:24px var(--edge) 20px;border-bottom:1px solid var(--hair)}
  .filter-row{display:flex;flex-wrap:wrap;gap:24px;align-items:flex-end}
  .filter-field{display:flex;flex-direction:column;gap:8px;min-width:220px}
  .filter-label{
    font-family:'Inter',sans-serif;font-weight:500;font-size:11px;
    letter-spacing:.1em;text-transform:uppercase;opacity:.55;
  }
  .filter-controls{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start}
  .dropdown{position:relative;display:inline-block;min-width:220px}
  .dd-button{
    font-family:'Inter',sans-serif;font-weight:500;font-size:11px;
    letter-spacing:.08em;text-transform:uppercase;
    padding:10px 36px 10px 14px;border:1px solid var(--ink);background:var(--paper);
    color:var(--ink);cursor:pointer;line-height:1;width:100%;text-align:left;
    display:inline-flex;align-items:center;justify-content:space-between;gap:12px;
    transition:background .15s ease,color .15s ease,border-color .15s ease;
    position:relative;
  }
  .dd-button::after{
    content:"▾";position:absolute;right:12px;top:50%;transform:translateY(-50%);
    font-size:10px;opacity:.55;
  }
  .dd-button:hover{border-color:var(--red);color:var(--red)}
  .dropdown.open .dd-button{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .dropdown.open .dd-button::after{opacity:1;transform:translateY(-50%) rotate(180deg)}
  .dropdown.has-value .dd-button{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .dd-value{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px}
  .dd-count{font-size:10px;padding:2px 6px;border:1px solid currentColor;margin-left:6px}
  .dd-panel{
    position:absolute;top:calc(100% - 1px);left:0;right:0;min-width:240px;
    background:var(--paper);border:1px solid var(--ink);z-index:40;
    max-height:340px;overflow-y:auto;padding:6px 0;
    box-shadow:0 8px 24px rgba(0,0,0,.08);
  }
  .dd-opt{
    display:flex;align-items:center;gap:10px;
    font-family:'Inter',sans-serif;font-weight:500;font-size:12px;
    letter-spacing:.06em;text-transform:uppercase;
    padding:10px 16px;cursor:pointer;background:transparent;border:0;width:100%;
    text-align:left;color:var(--ink);
  }
  .dd-opt:hover{background:var(--ink);color:var(--paper)}
  .dd-opt.selected{color:var(--red)}
  .dd-opt.selected:hover{color:var(--paper)}
  .dd-opt input[type=checkbox]{
    appearance:none;-webkit-appearance:none;
    width:14px;height:14px;border:1px solid currentColor;background:transparent;
    display:inline-flex;align-items:center;justify-content:center;margin:0;flex-shrink:0;
    cursor:pointer;
  }
  .dd-opt input[type=checkbox]:checked{background:currentColor}
  .dd-opt input[type=checkbox]:checked::after{
    content:"";width:6px;height:6px;background:var(--paper);
  }
  .dd-opt:hover input[type=checkbox]:checked::after{background:var(--ink)}
  .dd-group{
    font-family:'Inter',sans-serif;font-weight:500;font-size:10px;
    letter-spacing:.12em;text-transform:uppercase;opacity:.45;
    padding:10px 16px 4px;border-top:1px dashed rgba(10,10,10,.2);margin-top:4px;
  }
  .dd-group:first-child{border-top:0;margin-top:0}
  .filter-search{
    min-width:220px;
  }
  .filter-search input{
    width:100%;padding:10px 14px;border:1px solid var(--ink);background:var(--paper);
    color:var(--ink);font-family:'Inter',sans-serif;font-weight:500;font-size:11px;
    letter-spacing:.06em;text-transform:uppercase;line-height:1;outline:none;
    transition:border-color .15s ease,background .15s ease;
  }
  .filter-search input:focus{border-color:var(--red)}
  .filter-search input::placeholder{opacity:.45;text-transform:uppercase;letter-spacing:.08em}
  .filter-search.has-value input{background:var(--ink);color:var(--paper)}
  .filter-search.has-value input::placeholder{color:rgba(255,255,255,.45)}
  .results-meta{
    padding:18px var(--edge) 0;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    opacity:.55;
  }
  .results-meta .clear{margin-left:16px;text-decoration:underline;cursor:pointer}
  .results-meta .clear:hover{color:var(--red)}
  .empty-state{
    padding:72px var(--edge);text-align:center;
    font-family:'Inter Tight',sans-serif;font-weight:900;font-size:32px;
    letter-spacing:-0.03em;text-transform:uppercase;opacity:.35;
  }
  .empty-state .small{display:block;margin-top:16px;font-family:'Inter',sans-serif;font-weight:500;font-size:12px;letter-spacing:.08em;text-transform:uppercase;opacity:.8}
  @media (max-width:700px){
    .filter-row{flex-direction:column;gap:14px;align-items:stretch}
    .filter-field{min-width:0}
    .dropdown{min-width:0;width:100%}
  }

  /* ========== CARD GRID ========== */
  .grid{
    display:grid;gap:16px;padding:24px var(--edge) 96px;
    grid-template-columns:repeat(4,1fr);
  }
  @media (min-width:1440px){.grid{grid-template-columns:repeat(5,1fr)}}
  @media (max-width:1100px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media (max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:460px){.grid{grid-template-columns:1fr;padding:16px var(--edge) 72px}}

  .card{
    position:relative;display:flex;flex-direction:column;
    aspect-ratio:4/5;background:#0A0A0A;color:#F7F7F7;
    overflow:hidden;cursor:pointer;
    transition:transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .card:focus-visible{outline:3px solid var(--red);outline-offset:-3px}
  .card .bg{
    position:absolute;inset:0;background-size:cover;background-position:center;
    filter:grayscale(1) contrast(1.05) brightness(.78);
    transition:filter .5s ease,transform .8s cubic-bezier(.2,.7,.2,1);
  }
  .card:hover .bg{filter:grayscale(0) contrast(1.02) brightness(.9);transform:scale(1.04)}
  .card .shade{
    position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,0) 25%,rgba(0,0,0,.55) 65%,rgba(0,0,0,.92) 100%);
  }
  .card .topline{
    position:relative;z-index:2;padding:12px 12px 0;display:flex;flex-wrap:wrap;
    justify-content:flex-start;align-items:center;gap:6px;
    font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  }
  .card .topline .tag{
    /* High-contrast dark pill that reads against any poster photo. */
    color:#FFFFFF;line-height:1;padding:5px 9px;border-radius:2px;
    background:rgba(0,0,0,.72);
    border:1px solid rgba(255,255,255,.18);
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    display:inline-flex;align-items:center;
    text-shadow:0 1px 1px rgba(0,0,0,.45);
  }
  .card .topline .tag.solid{background:rgba(0,0,0,.72)}        /* alias kept for back-compat with existing markup */
  .card .topline .tag.red{
    background:var(--red);border-color:var(--red);
    color:#FFFFFF;letter-spacing:.06em;
    box-shadow:0 1px 4px rgba(225,38,28,.35);
  }
  .card .body{
    position:relative;z-index:2;margin-top:auto;padding:0 12px 12px;
  }
  .card h3{
    font-family:'Inter Tight',sans-serif;font-weight:900;
    letter-spacing:-0.03em;line-height:1;text-transform:uppercase;
    font-size:clamp(15px,1.4vw,20px);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    overflow:hidden;text-overflow:ellipsis;
  }
  .card .artist{
    margin-top:6px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    opacity:.95;font-weight:500;color:#fff;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;
  }
  .card .sub{
    margin-top:8px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    opacity:.78;display:flex;flex-direction:column;gap:2px;
  }
  .card .sub .row{display:flex;justify-content:space-between;gap:6px}
  .card .sub .row span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card .sub .price{color:#fff;opacity:1;font-weight:500}
  .card .arrow{
    position:absolute;right:10px;top:10px;z-index:2;
    font-family:'Inter Tight',sans-serif;font-weight:900;font-size:16px;opacity:0;
    transition:opacity .3s ease;
  }
  .card:hover .arrow{opacity:1}

  /* featured large card (first item on concerts page) */
  .grid.concerts .card:first-child{grid-column:span 2;aspect-ratio:2/1.2}
  .grid.concerts .card:first-child h3{font-size:clamp(24px,3vw,42px);-webkit-line-clamp:3}
  .grid.concerts .card:first-child .artist{font-size:13px;letter-spacing:.1em}
  @media (max-width:1100px){.grid.concerts .card:first-child{grid-column:span 2;aspect-ratio:2/1}}
  @media (max-width:760px){.grid.concerts .card:first-child{grid-column:span 2;aspect-ratio:3/2}}
  @media (max-width:460px){
    .grid.concerts .card:first-child{grid-column:span 1;aspect-ratio:4/5}
    .grid.concerts .card:first-child h3{font-size:18px}
  }

  /* ========== DETAIL PAGE ========== */
  .detail{padding:0 var(--edge) 96px}
  .detail .back{
    display:inline-flex;gap:10px;align-items:center;padding:24px 0;
    font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  }
  .detail .back:hover{color:var(--red)}
  .detail .hero{
    position:relative;aspect-ratio:16/7;overflow:hidden;background:#0A0A0A;color:#F7F7F7;
    border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);
  }
  @media (max-width:980px){.detail .hero{aspect-ratio:4/3}}
  .detail .hero .bg{
    position:absolute;inset:0;background-size:cover;background-position:center;
    filter:grayscale(1) contrast(1.05) brightness(.8);
  }
  .detail .hero .shade{
    position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(0,0,0,.7) 100%);
  }
  .detail .hero .hero-content{
    position:absolute;inset:auto 0 0 0;padding:40px 32px;z-index:2;
    display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;
  }
  .detail .hero h1{
    font-family:'Inter Tight',sans-serif;font-weight:900;
    letter-spacing:-0.045em;line-height:.88;text-transform:uppercase;
    font-size:clamp(40px,6vw,96px);max-width:20ch;
  }
  .detail .hero h1 .red{color:var(--red)}
  .detail .hero .tag-row{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .detail .hero .tag-row span{border:1px solid rgba(247,247,247,.55);padding:4px 8px}
  .detail .hero .tag-row span.on{background:var(--red);border-color:var(--red)}

  .detail .body{
    display:grid;grid-template-columns:5fr 7fr;gap:48px;padding:48px 0 0;
  }
  @media (max-width:980px){.detail .body{grid-template-columns:1fr;gap:24px}}
  .detail .meta{display:flex;flex-direction:column;gap:18px}
  .detail .meta .row{border-top:1px solid var(--hair);padding-top:10px;font-size:13px}
  .detail .meta .row b{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.55;font-weight:500;margin-bottom:4px}
  .detail .meta .cta{
    margin-top:8px;border-top:2px solid var(--ink);padding-top:14px;
    font-family:'Inter Tight',sans-serif;font-weight:900;font-size:20px;letter-spacing:-0.02em;text-transform:uppercase;
  }
  .detail .meta .cta a{border-bottom:2px solid var(--ink);padding-bottom:2px}
  .detail .meta .cta a:hover{color:var(--red);border-bottom-color:var(--red)}
  .detail .prose h2{
    font-family:'Inter Tight',sans-serif;font-weight:900;
    letter-spacing:-0.035em;line-height:.95;text-transform:uppercase;
    font-size:clamp(28px,3.5vw,44px);margin-bottom:20px;
  }
  .detail .prose p{font-size:16px;line-height:1.5;margin-bottom:18px;max-width:60ch}

  /* related section */
  .related{padding:64px var(--edge) 0}
  .related h4{
    font-family:'Inter Tight',sans-serif;font-weight:900;
    letter-spacing:-0.02em;text-transform:uppercase;font-size:20px;
    border-bottom:1px solid var(--hair);padding-bottom:12px;margin-bottom:20px;
  }

  /* ========== FOOTER ========== */
  footer{padding:64px var(--edge) 40px;border-top:1px solid var(--hair)}
  footer .f-grid{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end}
  footer .bm{
    font-family:'Inter Tight',sans-serif;font-weight:900;
    letter-spacing:-0.05em;line-height:.86;text-transform:uppercase;
    font-size:clamp(48px,9vw,120px);
  }
  footer .bm .red{color:var(--red)}
  footer .f-meta{font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.55;text-align:right;line-height:1.6}
  footer .f-meta b{display:block;color:var(--ink);opacity:.75;font-weight:500}
  @media (max-width:700px){
    footer .f-grid{grid-template-columns:1fr}
    footer .f-meta{text-align:left}
  }

  /* mobile nav */
  @media (max-width:700px){
    :root{--edge:20px}
    header.bar{grid-template-columns:1fr auto}
    .bar-right{display:none}
    nav.menu{gap:14px;font-size:10px;grid-column:1 / -1;justify-content:flex-start;order:3;margin-top:4px}
  }
</style>
</head>
<body>

<a class="skip-link" href="#app">Skip to main content</a>

<header class="bar">
  <a class="logo" href="#/">Live / BKK</a>
  <nav class="menu">
    <a href="#/" data-view="concerts">Concerts</a>
    <a href="#/festivals" data-view="festivals">Festivals</a>
    <a href="#/venues" data-view="venues">Venues</a>
    <a href="#/artists" data-view="artists">Artists</a>
  </nav>
  <div class="bar-right">Bangkok · Updated weekly</div>
</header>

<main id="app"></main>

<footer>
  <div class="f-grid">
    <div class="bm">Live /<br><span class="red">BKK.</span></div>
    <div class="f-meta">
      <b>Live / BKK Editorial</b>
      Krungthep · 13.7563°N · 100.5018°E<br>
      Sourced from Eventpop · Verified weekly<br>
      <span id="last-updated">Last updated · 22 Apr 2026</span>
    </div>
  </div>
</footer>

<script>
/* ======================================================================
   DATA — sourced from Eventpop (22 Apr 2026)
   Update weekly. Each entry has a stable id used in the URL hash.
   ====================================================================== */

let VENUES = {};
let ARTISTS = {};
let CONCERTS = [];

async function loadData(){
  try {
    const [cRes, vRes, aRes] = await Promise.all([
      fetch('data/concerts.json'),
      fetch('data/venues.json'),
      fetch('data/artists.json')
    ]);
    CONCERTS = await cRes.json();
    VENUES = await vRes.json();
    ARTISTS = await aRes.json();
    // Handle wrapper objects if present
    if (CONCERTS.concerts) CONCERTS = CONCERTS.concerts;
    if (CONCERTS.events) CONCERTS = CONCERTS.events;
    if (VENUES.venues) VENUES = VENUES.venues;
    if (ARTISTS.artists) ARTISTS = ARTISTS.artists;
    enrichConcertTags();
    router();
  } catch (e) {
    console.error('Failed to load data:', e);
    document.body.innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif"><h1>Live / BKK</h1><p>Unable to load concert data. Please check your connection and try again.</p></div>';
  }
}
;

/* ======================================================================
   ROUTER
   ====================================================================== */
const app = document.getElementById("app");

function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}

function bgCss(img, fallback){
  const urls = [img, fallback].filter(Boolean).map(u=>`url('${u}')`).join(",");
  return `background-image:${urls}`;
}

/* Per-route titles used for both nav-active marking and document.title. */
const VIEW_TITLES = {
  concerts: "Concerts",
  festivals: "Festivals",
  venues: "Venues",
  artists: "Artists",
};

function setActive(view){
  document.querySelectorAll("nav.menu a").forEach(a=>{
    const isActive = a.dataset.view===view;
    a.classList.toggle("active", isActive);
    if(isActive) a.setAttribute("aria-current", "page");
    else a.removeAttribute("aria-current");
  });
  // Keep document.title in sync with the route — important for screen readers
  // (which announce title on page change) and the browser tab.
  const label = VIEW_TITLES[view];
  if(label) document.title = `${label} — Live / BKK`;
}

/* A concert counts as a festival if it has the explicit `festival` status
   OR if its title clearly says so. */
function isFestival(c){
  if(!c) return false;
  if(c.status === "festival") return true;
  return /\bfestival\b|\bfest\b/i.test(c.title || "");
}

/* ---------- FILTER STATE ---------- */
const GENRES = [
  {id:"all", label:"All Genres"},
  {id:"alternative", label:"Alternative"},
  {id:"electronic", label:"Electronic"},
  {id:"hiphop", label:"Hip Hop"},
  {id:"indie", label:"Indie"},
  {id:"jazz", label:"Jazz"},
  {id:"metal", label:"Metal"},
  {id:"other", label:"Other"},
  {id:"pop", label:"Pop"},
  {id:"rnb", label:"R&b"},
  {id:"rock", label:"Rock"}
];
const MONTHS_2026 = [
  ["2026-01","January"],["2026-02","February"],["2026-03","March"],
  ["2026-04","April"],["2026-05","May"],["2026-06","June"],
  ["2026-07","July"],["2026-08","August"],["2026-09","September"],
  ["2026-10","October"],["2026-11","November"],["2026-12","December"]
];
const state = { when:"any", whenMonth:"", genres:[], recent:false, q:"" };

/* ---------- ARTIST → GENRE OVERRIDES (re-tagged at boot) ----------
   Title-keyword regex in scrapers can't catch every artist (e.g. "J.I.D –
   God Does Like World Tours" never says "rap"). This lookup patches tags
   for known artists at page-load time. Match is case-insensitive substring
   against the concert title. Existing curated tags are preserved unless
   they were left as a generic fallback (["other"]). */
const ARTIST_TAG_OVERRIDES = [
  // Hip-hop / rap
  { match: /\bj\.?i\.?d\b/i,                 tags:["hiphop","rnb"],          genre:"Hip-Hop" },
  { match: /\btyler[, ]+the[, ]+creator\b/i, tags:["hiphop","rnb"],          genre:"Hip-Hop" },
  { match: /\b(kendrick lamar|drake|travis scott|future|playboi carti|lil [a-z]+|young thug|21 savage|metro boomin|gunna|denzel curry|joey bada|earl sweatshirt|asap|a\$ap|action bronson|run the jewels|danny brown|ice cube|nas|jay[- ]z|eminem|snoop|dr\. dre)\b/i,
    tags:["hiphop"],                                                          genre:"Hip-Hop" },
  { match: /\b(thaitanium|youngohm|f\.hero|illslick|10milli|urboytj|milli|liltan|paothai|gavin\.d|nylas|kacha|raptor|fukking hero)\b/i,
    tags:["hiphop"],                                                          genre:"Thai Hip-Hop" },
  { match: /\b(bbno|bbno\$|jaden|smino)\b/i,  tags:["hiphop","rnb"],         genre:"Hip-Hop" },
  // R&B / soul
  { match: /\b(daniel caesar|sza|frank ocean|brent faiyaz|giveon|h\.e\.r|summer walker|jhene aiko|kehlani|jenevieve|the kid laroi)\b/i,
    tags:["rnb","pop"],                                                       genre:"R&B" },
  // Electronic / DJ / nightlife
  { match: /\b(dj |b2b|techno|house music|deep house|trance|drum.?n.?bass|dnb|bass music|edm|rave|warehouse|peggy gou|four tet|fred again|bicep|bonobo|tycho|bedouin|seth troxler|jamie xx|caribou|nina kraviz)\b/i,
    tags:["electronic"],                                                      genre:"Electronic" },
  // Metal / hardcore
  { match: /\b(metal|hardcore|deathcore|metalcore|grindcore|djent|black metal|death metal|defying decay|rats records|brand of sacrifice|spiritbox|architects|knocked loose|dexcore|kollaps|shadow of intent|metalverse)\b/i,
    tags:["metal","alternative"],                                             genre:"Metal" },
  // Indie / alternative
  { match: /\b(indie club|loudly murmuring|have you heard|blueprint livehouse|melt livehouse|speakerbox|de commune|mr\.?fox|bangkok island|horn presents|live ?house)\b/i,
    tags:["indie","alternative"],                                             genre:"Indie · Alternative" },
  // Pop (catch broad pop tours that fall through)
  { match: /\b(world tour|pop tour|fan ?meeting|fan ?con|fanfest|fanclub|comeback|showcase tour)\b/i,
    tags:["pop"],                                                             genre:"Pop · Tour" },
  // Jazz / classical
  { match: /\b(jazz|big band|orchestra|philharmonic|symphony|recital|chamber|choir|opera|ballet)\b/i,
    tags:["jazz"],                                                            genre:"Jazz · Classical" },
];

function enrichConcertTags(){
  CONCERTS.forEach(c => {
    // Only patch entries whose tags look auto-generated/generic.
    const isGeneric = !c.tags || c.tags.length === 0 ||
                      (c.tags.length === 1 && c.tags[0] === "other");
    if (!isGeneric) return;
    const hay = (c.title || "") + " " + (c.venueName || "") + " " +
                (c.venueId ? (VENUES[c.venueId]?.name || "") : "");
    for (const rule of ARTIST_TAG_OVERRIDES){
      if (rule.match.test(hay)){
        c.tags = rule.tags.slice();
        if (c.genre === "Live" || !c.genre) c.genre = rule.genre;
        return;
      }
    }
  });
}

function today(){ return new Date(); }
function iso(d){ return d.toISOString().slice(0,10); }
function startOfDay(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }

function dateMatches(c, when, month){
  if(!c.dateSort) return false;
  const cd = new Date(c.dateSort+"T00:00:00");
  const now = startOfDay(today());
  if(when==="any" && !month) return true;
  if(when==="today") return iso(cd)===iso(now);
  if(when==="weekend"){
    // upcoming Sat + Sun relative to today
    const day = now.getDay(); // 0=Sun..6=Sat
    const daysToSat = (6 - day + 7) % 7; // next Sat
    const sat = addDays(now, daysToSat);
    const sun = addDays(sat, 1);
    return iso(cd)===iso(sat) || iso(cd)===iso(sun);
  }
  if(when==="nextweek"){
    const day = now.getDay(); // 0=Sun..6=Sat
    const daysToNextMon = ((1 - day + 7) % 7) || 7;
    const mon = addDays(now, daysToNextMon);
    const sun = addDays(mon, 6);
    return cd >= startOfDay(mon) && cd <= addDays(sun,1);
  }
  if(when==="month"){
    return cd.getFullYear()===now.getFullYear() && cd.getMonth()===now.getMonth();
  }
  if(month){ // "2026-05" etc
    return c.dateSort.startsWith(month);
  }
  return true;
}
function genreMatches(c, genres){
  if(!genres || genres.length===0) return true;
  const tags = c.tags || [];
  return genres.some(g => tags.includes(g));
}
function searchMatches(c, q){
  if(!q) return true;
  const needle = q.trim().toLowerCase();
  if(!needle) return true;
  const venue = c.venueId ? (VENUES[c.venueId]?.name || "") : (c.venueName || "");
  // Resolve artist ids to names (and aliases) so a search for "JID" matches
  // both the title and the artist record.
  const artistText = (c.artists||[]).map(id => {
    const a = ARTISTS[id]; if(!a) return id;
    return [a.name, ...(a.aliases||[])].join(" ");
  }).join(" ");
  const hay = `${c.title||""} ${venue} ${artistText} ${c.genre||""}`.toLowerCase();
  return hay.includes(needle);
}

function applyFilters(list){
  let out = list.slice();
  out = out.filter(c=>dateMatches(c, state.when, state.whenMonth));
  out = out.filter(c=>genreMatches(c, state.genres));
  out = out.filter(c=>searchMatches(c, state.q));
  if(state.recent){
    // Sort by added date descending, then by event date as tie-breaker
    out.sort((a,b)=>{
      const byAdded = (b.added||"").localeCompare(a.added||"");
      if(byAdded !== 0) return byAdded;
      return (b.dateSort||"").localeCompare(a.dateSort||"");
    });
    return out;
  }
  // default sort: upcoming + festival first (earliest), then past (most recent)
  const future = out.filter(c=>c.status!=="past").sort((a,b)=>a.dateSort.localeCompare(b.dateSort));
  const past = out.filter(c=>c.status==="past").sort((a,b)=>b.dateSort.localeCompare(a.dateSort));
  return [...future, ...past];
}

const WHEN_OPTS = [
  ["any","Any Date"],
  ["today","Today"],
  ["weekend","This Weekend"],
  ["nextweek","Next Week"],
  ["month","This Month"]
];

function whenLabel(){
  if(state.whenMonth){
    const m = MONTHS_2026.find(x=>x[0]===state.whenMonth);
    return m ? `${m[1]} 2026` : "Any Date";
  }
  const w = WHEN_OPTS.find(x=>x[0]===state.when);
  return w ? w[1] : "Any Date";
}
function genreLabel(){
  if(state.genres.length===0) return "All Genres";
  if(state.genres.length===1){
    const g = GENRES.find(x=>x.id===state.genres[0]);
    return g ? g.label : "All Genres";
  }
  return `${state.genres.length} Genres`;
}
function moreLabel(){ return state.recent ? "Date Added (Newest first)" : "Date of Event (Soonest first)"; }

function renderFilters(){
  // WHEN dropdown
  const whenOpts = WHEN_OPTS.map(([id,label])=>{
    const sel = (state.when===id && !state.whenMonth) ? "selected":"";
    return `<button class="dd-opt ${sel}" data-when="${id}"><span>${label}</span></button>`;
  }).join("");
  const monthOpts = MONTHS_2026.map(([v,l])=>{
    const sel = state.whenMonth===v ? "selected":"";
    return `<button class="dd-opt ${sel}" data-month="${v}"><span>${l} 2026</span></button>`;
  }).join("");
  const whenHasValue = (state.when!=="any" || state.whenMonth) ? "has-value":"";

  // GENRE dropdown (multi-select with checkboxes)
  const allChecked = state.genres.length===0 ? "checked":"";
  const genreCheckboxes = GENRES.filter(g=>g.id!=="all").map(g=>{
    const checked = state.genres.includes(g.id) ? "checked":"";
    const sel = checked ? "selected":"";
    return `<label class="dd-opt ${sel}"><input type="checkbox" data-genre="${g.id}" ${checked}/><span>${g.label}</span></label>`;
  }).join("");
  const genreHasValue = state.genres.length>0 ? "has-value":"";
  const genreBadge = state.genres.length>1 ? `<span class="dd-count">${state.genres.length}</span>` : "";

  // MORE dropdown
  const moreDefaultSel = !state.recent ? "selected":"";
  const moreRecentSel = state.recent ? "selected":"";
  const moreHasValue = state.recent ? "has-value":"";

  const qHasValue = state.q ? "has-value" : "";
  const qVal = (state.q || "").replace(/"/g,"&quot;");

  return `
    <section class="filters">
      <div class="filter-row">
        <div class="filter-field filter-search ${qHasValue}">
          <div class="filter-label">Search</div>
          <input type="search" data-search placeholder="Artist, venue, festival…" value="${qVal}" autocomplete="off"/>
        </div>
        <div class="filter-field">
          <div class="filter-label">When</div>
          <div class="dropdown ${whenHasValue}" data-dd="when">
            <button type="button" class="dd-button" data-dd-toggle aria-haspopup="listbox" aria-expanded="false">
              <span class="dd-value">${whenLabel()}</span>
            </button>
            <div class="dd-panel" hidden>
              <div class="dd-group">Quick</div>
              ${whenOpts}
              <div class="dd-group">2026 Months</div>
              ${monthOpts}
            </div>
          </div>
        </div>
        <div class="filter-field">
          <div class="filter-label">Genres</div>
          <div class="dropdown ${genreHasValue}" data-dd="genre">
            <button type="button" class="dd-button" data-dd-toggle aria-haspopup="listbox" aria-expanded="false">
              <span class="dd-value">${genreLabel()}</span>${genreBadge}
            </button>
            <div class="dd-panel" hidden>
              <label class="dd-opt ${allChecked}"><input type="checkbox" data-genre="all" ${allChecked}/><span>All Genres</span></label>
              <div class="dd-group">Genres</div>
              ${genreCheckboxes}
            </div>
          </div>
        </div>
        <div class="filter-field">
          <div class="filter-label">Sort</div>
          <div class="dropdown ${moreHasValue}" data-dd="more">
            <button type="button" class="dd-button" data-dd-toggle aria-haspopup="listbox" aria-expanded="false">
              <span class="dd-value">${moreLabel()}</span>
            </button>
            <div class="dd-panel" hidden>
              <button class="dd-opt ${moreDefaultSel}" data-more="default"><span>Date of Event (Soonest first)</span></button>
              <button class="dd-opt ${moreRecentSel}" data-more="recent"><span>Date Added (Newest first)</span></button>
            </div>
          </div>
        </div>
      </div>
    </section>
  `;
}

/* Shared list page (Concerts and Festivals share the same shell). */
function renderListPage(opts){
  setActive(opts.view);
  const pool = CONCERTS.filter(opts.predicate);
  const allUpcoming = pool.filter(c=>c.status!=="past").length;
  const allPast = pool.filter(c=>c.status==="past").length;
  const filtered = applyFilters(pool);
  const hasFilters = state.when!=="any" || state.whenMonth || state.genres.length>0 || state.recent || state.q;
  const cards = filtered.length
    ? filtered.map(concertCard).join("")
    : `<div class="empty-state" style="grid-column:1/-1">${opts.emptyTitle}<span class="small">Try widening the date range or clearing a filter.</span></div>`;
  const clearLink = hasFilters ? `<a class="clear" data-clear>Clear filters</a>` : "";
  app.innerHTML = `
    <section class="page-head">
      <h1>${opts.heading}<span class="red">.</span></h1>
      <div class="meta">
        <b>${allUpcoming} upcoming</b>
        ${allPast} archived<br>
        ${opts.metaLine}
      </div>
    </section>
    ${renderFilters()}
    <div class="results-meta">${filtered.length} result${filtered.length===1?"":"s"}${clearLink}</div>
    <div class="grid concerts">${cards}</div>
  `;
  wireFilterRow(opts.rerender);
  window.scrollTo({top:0,behavior:"instant"});
}

function renderConcerts(){
  renderListPage({

/* Wire up the filter dropdowns + search box. Used by both renderConcerts
   and renderFestivals — the rerender callback decides which page repaints. */
function wireFilterRow(rerender){
  const setExpanded = (d, expanded)=>{
    const btn = d.querySelector("[data-dd-toggle]");
    if(btn) btn.setAttribute("aria-expanded", String(!!expanded));
  };
  const openDropdown = (name)=>{
    app.querySelectorAll(".dropdown").forEach(d=>{
      const panel = d.querySelector(".dd-panel");
      const isThis = d.dataset.dd===name;
      d.classList.toggle("open", isThis);
      if(panel) panel.hidden = !isThis;
      setExpanded(d, isThis);
    });
  };
  const closeAll = ()=>{
    app.querySelectorAll(".dropdown").forEach(d=>{
      d.classList.remove("open");
      const panel = d.querySelector(".dd-panel");
      if(panel) panel.hidden = true;
      setExpanded(d, false);
    });
  };
  app.querySelectorAll(".dropdown").forEach(dd=>{
    const btn = dd.querySelector("[data-dd-toggle]");
    btn.addEventListener("click",(e)=>{
      e.stopPropagation();
      const isOpen = dd.classList.contains("open");
      if(isOpen) closeAll();
      else openDropdown(dd.dataset.dd);
    });
  });
  app.querySelectorAll(".dd-panel").forEach(p=>p.addEventListener("click", e=>e.stopPropagation()));
  if(!window.__ddCloseBound){
    window.__ddCloseBound = true;
    document.addEventListener("click",()=>{
      document.querySelectorAll(".dropdown").forEach(d=>{
        d.classList.remove("open");
        const panel = d.querySelector(".dd-panel");
        if(panel) panel.hidden = true;
        const btn = d.querySelector("[data-dd-toggle]");
        if(btn) btn.setAttribute("aria-expanded", "false");
      });
    });
    // ESC closes any open dropdown — basic keyboard hygiene
    document.addEventListener("keydown",(e)=>{
      if(e.key === "Escape"){
        document.querySelectorAll(".dropdown.open").forEach(d=>{
          d.classList.remove("open");
          const panel = d.querySelector(".dd-panel");
          if(panel) panel.hidden = true;
          const btn = d.querySelector("[data-dd-toggle]");
          if(btn){ btn.setAttribute("aria-expanded","false"); btn.focus(); }
        });
      }
    });
  }

  app.querySelectorAll("[data-when]").forEach(el=>el.addEventListener("click",(e)=>{
    e.stopPropagation();
    state.when = el.dataset.when; state.whenMonth = ""; rerender();
  }));
  app.querySelectorAll("[data-month]").forEach(el=>el.addEventListener("click",(e)=>{
    e.stopPropagation();
    state.whenMonth = el.dataset.month; state.when = "any"; rerender();
  }));

  app.querySelectorAll("[data-genre]").forEach(el=>{
    const handler = (e)=>{
      e.stopPropagation();
      const id = el.dataset.genre;
      if(id==="all"){ state.genres = []; }
      else {
        const i = state.genres.indexOf(id);
        if(i>=0) state.genres.splice(i,1); else state.genres.push(id);
      }
      rerender();
      requestAnimationFrame(()=>openDropdown("genre"));
    };
    if(el.tagName === "INPUT"){
      el.addEventListener("change", handler);
      el.addEventListener("click", e=>e.stopPropagation());
    }
  });

  app.querySelectorAll("[data-more]").forEach(el=>el.addEventListener("click",(e)=>{
    e.stopPropagation();
    state.recent = el.dataset.more === "recent"; rerender();
  }));

  const searchInput = app.querySelector("[data-search]");
  if(searchInput){
    searchInput.addEventListener("click", e=>e.stopPropagation());
    let t = null;
    searchInput.addEventListener("input", (e)=>{
      const v = e.target.value;
      clearTimeout(t);
      t = setTimeout(()=>{
        state.q = v;
        const cur = e.target.selectionStart;
        rerender();
        const again = app.querySelector("[data-search]");
        if(again){ again.focus(); try { again.setSelectionRange(cur, cur); } catch(_){} }
      }, 120);
    });
  }

  const clearBtn = app.querySelector("[data-clear]");
  if(clearBtn) clearBtn.addEventListener("click",()=>{
    state.when="any"; state.whenMonth=""; state.genres=[]; state.recent=false; state.q="";
    rerender();
  });
}

function genreLabelFor(tagId){
  const g = GENRES.find(x => x.id === tagId);
  return g ? g.label : tagId;
}

function concertCard(c){
  const venueName = c.venueId ? VENUES[c.venueId]?.name : c.venueName;
  const primaryTag = (c.tags && c.tags[0]) || null;
  const genreChip = primaryTag
    ? `<span class="tag solid">${escapeHtml(genreLabelFor(primaryTag))}</span>`
    : "";
  // Compose the artist line: prefer curated ARTISTS lookup, then artistText.
  // Suppress when it would just repeat the title or venue verbatim.
  let artist = "";
  if (c.artists && c.artists.length){
    const names = c.artists.map(id => ARTISTS[id]?.name).filter(Boolean);
    if (names.length) artist = names.join(", ");
  }
  if (!artist && c.artistText) artist = c.artistText;
  if (artist){
    const norm = s => (s||"").toLowerCase().replace(/[^a-z0-9]+/g,"");
    if (norm(artist) === norm(c.title) || norm(artist) === norm(venueName)) artist = "";
  }
  // Date + time chip
  const dateLabel = c.time ? `${c.date} · ${c.time}` : c.date;
  // Compose a richer aria-label so screen readers get title + date + venue + price.
  const labelParts = [c.title, dateLabel, venueName, c.price].filter(Boolean);
  const ariaLabel = escapeHtml(labelParts.join(", "));
  return `
    <a class="card" href="#/concert/${c.id}" aria-label="${ariaLabel}">
      <div class="bg" style="${bgCss(c.image, c.fallback)}" aria-hidden="true"></div>
      <div class="shade" aria-hidden="true"></div>
      <div class="topline">
        <span class="tag" aria-label="Date">${escapeHtml(dateLabel)}</span>
        ${genreChip}
        ${c.tag ? `<span class="tag ${c.status==="past"?"":"red"}">${escapeHtml(c.tag)}</span>` : ""}
      </div>
      <span class="arrow">→</span>
      <div class="body">
        <h3>${escapeHtml(c.title)}</h3>
        ${artist ? `<div class="artist">${escapeHtml(artist)}</div>` : ""}
        <div class="sub">
          <div class="row"><span>${escapeHtml(venueName||"Venue TBA")}</span></div>
          <div class="row"><span>${escapeHtml(c.genre||"")}</span><span class="price">${escapeHtml(c.price||"")}</span></div>
        </div>
      </div>
    </a>`;
}

function renderArtists(){
  setActive("artists");
  const artists = Object.values(ARTISTS);
  const cards = artists.map(a=>{
    const shows = CONCERTS.filter(c=>c.artists.includes(a.id));
    const count = shows.length;
    // Aggregate genres across this artist's concerts and pick the most common.
    const tagCounts = {};
    shows.forEach(c => (c.tags||[]).forEach(t => { tagCounts[t]=(tagCounts[t]||0)+1; }));
    const topTag = Object.entries(tagCounts).sort((x,y)=>y[1]-x[1])[0]?.[0];
    const genreChip = topTag
      ? `<span class="tag">${escapeHtml(genreLabelFor(topTag))}</span>`
      : "";
    // Next upcoming date
    const upcoming = shows.filter(c=>c.status!=="past")
                          .sort((x,y)=>x.dateSort.localeCompare(y.dateSort));
    const nextDate = upcoming[0]?.date || null;
    return `
      <a class="card" href="#/artist/${a.id}" aria-label="${escapeHtml(a.name)}">
        <div class="bg" style="${bgCss(a.image, a.fallback)}"></div>
        <div class="shade"></div>
        <div class="topline">
          <span class="tag">${escapeHtml(a.role)}</span>
          ${genreChip}
          ${nextDate ? `<span class="tag red">${escapeHtml(nextDate)}</span>` : ""}
        </div>
        <span class="arrow">→</span>
        <div class="body">
          <h3>${escapeHtml(a.name)}</h3>
          <div class="sub">
            <span>${escapeHtml(a.country)}</span>
            <span>${count} date${count===1?"":"s"} on file</span>
          </div>
        </div>
      </a>`;
  }).join("");

  app.innerHTML = `
    <section class="page-head">
      <h1>Artists<span class="red">.</span></h1>
      <div class="meta">
        <b>${artists.length} artists tracked</b>
        Linked to verified shows<br>
        Sourced · Eventpop
      </div>
    </section>
    <div class="grid">${cards}</div>
  `;
  window.scrollTo({top:0,behavior:"instant"});
}

      <a class="back" href="#/">← All concerts</a>
      <div class="hero">
        <div class="bg" style="${bgCss(c.image, c.fallback)}"></div>
        <div class="shade"></div>
        <div class="hero-content">
          <h1>${escapeHtml(c.title).replace(/—/g,'<span class="red">—</span>')}</h1>
          <div class="tag-row">
            <span>${escapeHtml(c.date)}</span>
            <span>${escapeHtml(c.genre)}</span>
            ${c.status==="upcoming"?'<span class="on">On sale</span>':""}
            ${c.status==="past"?'<span>Archived</span>':""}
            ${c.status==="festival"?'<span>Festival</span>':""}
          </div>
        </div>
      </div>
      <div class="body">
        <div class="meta">
          <div class="row"><b>Date</b>${escapeHtml(c.date)}</div>
          <div class="row"><b>Venue</b>${venue ? `<a href="#/venue/${venue.id}">${escapeHtml(venueName)} →</a>` : escapeHtml(venueName)}</div>
          <div class="row"><b>Genre</b>${escapeHtml(c.genre)}</div>
          <div class="row"><b>Price</b>${escapeHtml(c.price)}</div>
          ${relatedArtists.length ? `<div class="row"><b>Artists</b>${relatedArtists.map(a=>`<a href="#/artist/${a.id}">${escapeHtml(a.name)}</a>`).join(" · ")}</div>` : ""}
          <div class="cta"><a href="${escapeHtml(c.link)}" target="_blank" rel="noopener">${escapeHtml(c.linkLabel)} →</a></div>
        </div>
        <div class="prose">
          <h2>About this show.</h2>
          <p>${escapeHtml(c.long||c.blurb)}</p>
          ${venue ? `<p><b>Where.</b> ${escapeHtml(venue.blurb)}</p>` : ""}
          <p><b>How we know.</b> This listing is pulled from Eventpop's public search and verified against the organiser's event page. Links open the original source.</p>
        </div>
      </div>
    </section>
  `;
  window.scrollTo({top:0,behavior:"instant"});
}

function renderVenueDetail(id){
  setActive("venues");
  const v = VENUES[id];
  if(!v){ location.hash="#/venues"; return; }
  document.title = `${v.name} — Live / BKK`;
  const upcoming = CONCERTS.filter(c=>c.venueId===v.id && c.status==="upcoming")
    .sort((a,b)=>a.dateSort.localeCompare(b.dateSort));
  const past = CONCERTS.filter(c=>c.venueId===v.id && c.status==="past")
    .sort((a,b)=>b.dateSort.localeCompare(a.dateSort));

  app.innerHTML = `
    <section class="detail">
      <a class="back" href="#/venues">← All venues</a>
      <div class="hero">
        <div class="bg" style="${bgCss(v.image)}"></div>
        <div class="shade"></div>
        <div class="hero-content">
          <h1>${escapeHtml(v.name)}<span class="red">.</span></h1>
          <div class="tag-row">
            <span>${escapeHtml(v.type)}</span>
            <span>${escapeHtml(v.city)}</span>
            <span>Cap ${escapeHtml(v.cap)}</span>
          </div>
        </div>
      </div>
      <div class="body">
        <div class="meta">
          <div class="row"><b>Type</b>${escapeHtml(v.type)}</div>
          <div class="row"><b>City</b>${escapeHtml(v.city)}</div>
          <div class="row"><b>Capacity</b>${escapeHtml(v.cap)}</div>
          <div class="row"><b>Area</b>${escapeHtml(v.area)}</div>
          <div class="row"><b>Upcoming</b>${upcoming.length} shows</div>
          <div class="row"><b>Archive</b>${past.length} shows</div>
          <div class="cta"><a href="${escapeHtml(v.link)}" target="_blank" rel="noopener">${escapeHtml(v.linkLabel)} →</a></div>
        </div>
        <div class="prose">
          <h2>About the room.</h2>
          <p>${escapeHtml(v.long)}</p>
        </div>
      </div>
      ${upcoming.length ? `<section class="related">
        <h4>Upcoming at ${escapeHtml(v.name)}</h4>
        <div class="grid" style="padding:0">${upcoming.map(concertCard).join("")}</div>
      </section>` : ""}
      ${past.length ? `<section class="related">
        <h4>Past shows at ${escapeHtml(v.name)}</h4>
        <div class="grid" style="padding:0">${past.map(concertCard).join("")}</div>
      </section>` : ""}
    </section>
  `;
  window.scrollTo({top:0,behavior:"instant"});
}

function renderArtistDetail(id){
  setActive("artists");
  const a = ARTISTS[id];
  if(!a){ location.hash="#/artists"; return; }
  document.title = `${a.name} — Live / BKK`;
  const shows = CONCERTS.filter(c=>c.artists.includes(a.id))
    .sort((x,y)=>y.dateSort.localeCompare(x.dateSort));

  app.innerHTML = `
    <section class="detail">
      <a class="back" href="#/artists">← All artists</a>
      <div class="hero">
        <div class="bg" style="${bgCss(a.image, a.fallback)}"></div>
        <div class="shade"></div>
        <div class="hero-content">
          <h1>${escapeHtml(a.name)}<span class="red">.</span></h1>
          <div class="tag-row">
            <span>${escapeHtml(a.role)}</span>
            <span>${escapeHtml(a.country)}</span>
            <span>${shows.length} date${shows.length===1?"":"s"}</span>
          </div>
        </div>
      </div>
      <div class="body">
        <div class="meta">
          <div class="row"><b>Role</b>${escapeHtml(a.role)}</div>
          <div class="row"><b>Origin</b>${escapeHtml(a.country)}</div>
          <div class="row"><b>Dates on file</b>${shows.length}</div>
        </div>
        <div class="prose">
          <h2>About.</h2>
          <p>${escapeHtml(a.long||a.blurb)}</p>
        </div>
      </div>
      ${shows.length ? `<section class="related">
        <h4>Shows by ${escapeHtml(a.name)}</h4>
        <div class="grid" style="padding:0">${shows.map(concertCard).join("")}</div>
      </section>` : ""}
    </section>
  `;
  window.scrollTo({top:0,behavior:"instant"});
}

function router(){
  const hash = (location.hash||"#/").replace(/^#/,"");
  const parts = hash.split("/").filter(Boolean); // ["concert","id"]
  if(parts.length===0){ renderConcerts(); return; }
  const [kind, id] = parts;
  if(kind==="festivals") return renderFestivals();
  if(kind==="venues") return renderVenues();
  if(kind==="artists") return renderArtists();
  if(kind==="concert" && id) return renderConcertDetail(id);
  if(kind==="venue" && id) return renderVenueDetail(id);
  if(kind==="artist" && id) return renderArtistDetail(id);
  renderConcerts();
}
window.addEventListener("hashchange", router);
loadData();
</script>
</body>
</html>
